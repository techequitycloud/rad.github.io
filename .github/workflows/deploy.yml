name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so Docusaurus can derive accurate git-based
          # lastmod (sitemap) and "Last updated" timestamps per doc.
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build website
        run: npm run build
        
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./build

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # Notify Bing/Yandex (and anything else consuming IndexNow) of the URLs
  # whose source docs changed in this push. The key is public by design —
  # it is served at https://docs.radmodules.dev/<key>.txt for verification.
  indexnow:
    runs-on: ubuntu-latest
    needs: deploy
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Submit changed URLs to IndexNow
        run: |
          python3 - <<'PY'
          import json, subprocess, sys, urllib.request

          HOST = 'docs.radmodules.dev'
          KEY = 'b672980f216263395cf9f93280f8edc5'

          try:
              changed = subprocess.run(
                  ['git', 'diff', '--name-only', '--diff-filter=d', 'HEAD^', 'HEAD'],
                  capture_output=True, text=True, check=True,
              ).stdout.splitlines()
          except subprocess.CalledProcessError:
              print('No parent commit to diff against; skipping.')
              sys.exit(0)

          urls = set()
          for path in changed:
              if path.startswith('docs/') and path.endswith('.md'):
                  stem = path[:-3]
                  if '/Sample_' in stem:  # unlisted template docs
                      continue
                  urls.add(f'https://{HOST}/{stem}')
              elif path.startswith('src/pages/') and path.endswith('.md'):
                  urls.add(f'https://{HOST}/{path[len("src/pages/"):-3]}')
              elif path == 'src/pages/index.tsx':
                  urls.add(f'https://{HOST}/')

          if not urls:
              print('No content URLs changed; nothing to submit.')
              sys.exit(0)

          payload = {
              'host': HOST,
              'key': KEY,
              'keyLocation': f'https://{HOST}/{KEY}.txt',
              'urlList': sorted(urls)[:10000],
          }
          req = urllib.request.Request(
              'https://api.indexnow.org/indexnow',
              data=json.dumps(payload).encode(),
              headers={'Content-Type': 'application/json; charset=utf-8'},
          )
          try:
              with urllib.request.urlopen(req, timeout=30) as res:
                  print(f'IndexNow: HTTP {res.status} for {len(urls)} URL(s)')
          except urllib.error.HTTPError as e:
              # Non-fatal: indexing pings must never fail the deploy.
              print(f'IndexNow submission failed: HTTP {e.code} {e.read()[:200]}')
          PY

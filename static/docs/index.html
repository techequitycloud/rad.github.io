<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!--
      GitHub Pages redirects the bare /docs segment to /docs/ (directory
      precedence), which previously had no index and returned 404. Docusaurus
      generates no route at /docs itself, so this static page fills the gap
      and forwards to the documentation entry point.
    -->
    <meta http-equiv="refresh" content="0; url=/docs/guides/using-rad" />
    <link rel="canonical" href="https://docs.radmodules.dev/docs/guides/using-rad" />
    <meta name="robots" content="noindex" />
    <title>RAD Platform Documentation</title>
  </head>
  <body>
    <p>Redirecting to <a href="/docs/guides/using-rad">RAD Platform documentation</a>…</p>
  </body>
</html>
